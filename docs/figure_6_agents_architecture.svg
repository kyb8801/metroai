<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Pretendard, Inter, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="1000" height="720" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-size="22" font-weight="600" fill="#0F172A" letter-spacing="-0.5">
    MetroAI 6-Agent Orchestration Architecture
  </text>
  <text x="500" y="62" text-anchor="middle" font-size="13" fill="#475569">
    v2 design Figure 8 · KOLAS Compliance OS · v0.6.0
  </text>

  <!-- Top: Output band -->
  <g>
    <rect x="200" y="100" width="600" height="60" rx="8" fill="#1E40AF" stroke="#1E3A8A" stroke-width="1"/>
    <text x="500" y="125" text-anchor="middle" font-size="14" font-weight="600" fill="white">
      Quality Manager Dashboard
    </text>
    <text x="500" y="145" text-anchor="middle" font-size="12" fill="#BAE6FD" font-family="JetBrains Mono, monospace">
      Audit Risk · Task Queue · KOLAS Feed · Certificates
    </text>
  </g>

  <!-- Edges from agents to top dashboard (orchestrator center) -->
  <g stroke="#06B6D4" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="500" y1="350" x2="500" y2="160"/>
  </g>

  <!-- Center: orchestrator -->
  <g>
    <circle cx="500" cy="380" r="50" fill="#1E40AF" stroke="#1E3A8A" stroke-width="2"/>
    <text x="500" y="376" text-anchor="middle" font-size="13" font-weight="600" fill="white" font-family="JetBrains Mono, monospace">
      orchestrator
    </text>
    <text x="500" y="394" text-anchor="middle" font-size="10" fill="#BAE6FD">
      P0 / P1 / P2 queue
    </text>
  </g>

  <!-- 5 satellite agents around orchestrator -->
  <!-- kolas-audit-predictor (right) -->
  <g>
    <line x1="500" y1="380" x2="730" y2="320" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>
    <rect x="640" y="280" width="200" height="80" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="740" y="305" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF" font-family="JetBrains Mono, monospace">
      kolas-audit-predictor
    </text>
    <text x="740" y="325" text-anchor="middle" font-size="10" fill="#475569">
      audit risk prediction
    </text>
    <text x="740" y="343" text-anchor="middle" font-size="9" fill="#06B6D4" font-family="JetBrains Mono, monospace">
      baseline · validation pending
    </text>
    <rect x="725" y="350" width="30" height="14" rx="3" fill="#06B6D4"/>
    <text x="740" y="361" text-anchor="middle" font-size="9" fill="white" font-weight="600" font-family="JetBrains Mono, monospace">AI</text>
  </g>

  <!-- kolas-monitor (top-right) -->
  <g>
    <line x1="500" y1="380" x2="690" y2="200" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>
    <rect x="600" y="180" width="180" height="70" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="690" y="202" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF" font-family="JetBrains Mono, monospace">
      kolas-monitor
    </text>
    <text x="690" y="220" text-anchor="middle" font-size="10" fill="#475569">
      regulatory scan
    </text>
    <text x="690" y="237" text-anchor="middle" font-size="9" fill="#06B6D4" font-family="JetBrains Mono, monospace">
      live / stub fallback
    </text>
  </g>

  <!-- schedule (top-left) -->
  <g>
    <line x1="500" y1="380" x2="310" y2="200" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>
    <rect x="220" y="180" width="180" height="70" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="310" y="202" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF" font-family="JetBrains Mono, monospace">
      schedule
    </text>
    <text x="310" y="220" text-anchor="middle" font-size="10" fill="#475569">
      audit · calibration cal.
    </text>
    <text x="310" y="237" text-anchor="middle" font-size="9" fill="#475569" font-family="JetBrains Mono, monospace">
      rule-based
    </text>
  </g>

  <!-- semi-intel (left) -->
  <g>
    <line x1="500" y1="380" x2="270" y2="320" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>
    <rect x="160" y="280" width="200" height="80" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="260" y="305" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF" font-family="JetBrains Mono, monospace">
      semi-intel
    </text>
    <text x="260" y="325" text-anchor="middle" font-size="10" fill="#475569">
      semiconductor signals
    </text>
    <text x="260" y="343" text-anchor="middle" font-size="9" fill="#475569" font-family="JetBrains Mono, monospace">
      DART · NTIS
    </text>
  </g>

  <!-- job-scout (bottom-left) -->
  <g>
    <line x1="500" y1="380" x2="310" y2="500" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>
    <rect x="220" y="490" width="180" height="70" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="310" y="512" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF" font-family="JetBrains Mono, monospace">
      job-scout
    </text>
    <text x="310" y="530" text-anchor="middle" font-size="10" fill="#475569">
      personnel turnover
    </text>
    <text x="310" y="547" text-anchor="middle" font-size="9" fill="#06B6D4" font-family="JetBrains Mono, monospace">
      stub · v0.7 live
    </text>
    <rect x="295" y="552" width="30" height="14" rx="3" fill="#06B6D4"/>
    <text x="310" y="563" text-anchor="middle" font-size="9" fill="white" font-weight="600" font-family="JetBrains Mono, monospace">AI</text>
  </g>

  <!-- Bottom: input data sources -->
  <g>
    <line x1="500" y1="430" x2="500" y2="600" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="100" y="620" width="200" height="60" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="200" y="643" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">
      External feeds
    </text>
    <text x="200" y="660" text-anchor="middle" font-size="9" fill="#475569" font-family="JetBrains Mono, monospace">
      knab.go.kr · DART · NTIS
    </text>
    <text x="200" y="673" text-anchor="middle" font-size="9" fill="#475569" font-family="JetBrains Mono, monospace">
      ISO/IEC 17025 · KOLAS-G
    </text>

    <rect x="320" y="620" width="200" height="60" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="420" y="643" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">
      Institution data
    </text>
    <text x="420" y="660" text-anchor="middle" font-size="9" fill="#475569" font-family="JetBrains Mono, monospace">
      SOP DB · certificates
    </text>
    <text x="420" y="673" text-anchor="middle" font-size="9" fill="#475569" font-family="JetBrains Mono, monospace">
      personnel · audit history
    </text>

    <rect x="540" y="620" width="200" height="60" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="640" y="643" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">
      Models
    </text>
    <text x="640" y="660" text-anchor="middle" font-size="9" fill="#475569" font-family="JetBrains Mono, monospace">
      GBT (sklearn) · GUM (sympy)
    </text>
    <text x="640" y="673" text-anchor="middle" font-size="9" fill="#475569" font-family="JetBrains Mono, monospace">
      synthetic + real-data wip
    </text>

    <rect x="760" y="620" width="200" height="60" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="860" y="643" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">
      Audit trail
    </text>
    <text x="860" y="660" text-anchor="middle" font-size="9" fill="#475569" font-family="JetBrains Mono, monospace">
      Ed25519 + W3C PROV-O
    </text>
    <text x="860" y="673" text-anchor="middle" font-size="9" fill="#475569" font-family="JetBrains Mono, monospace">
      tamper-evident JSON-LD
    </text>
  </g>

  <!-- Legend -->
  <g>
    <rect x="40" y="100" width="14" height="14" rx="3" fill="#06B6D4"/>
    <text x="60" y="112" font-size="11" fill="#475569">AI-powered output</text>
    <rect x="40" y="122" width="14" height="14" rx="3" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="60" y="134" font-size="11" fill="#475569">Rule / heuristic</text>
    <line x1="40" y1="150" x2="54" y2="150" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>
    <text x="60" y="154" font-size="11" fill="#475569">Agent → orchestrator</text>
    <line x1="40" y1="170" x2="54" y2="170" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="60" y="174" font-size="11" fill="#475569">External feed</text>
  </g>

  <!-- Caption -->
  <text x="500" y="710" text-anchor="middle" font-size="10" fill="#94A3B8" font-style="italic">
    Figure 8. Six AI agents coordinated by orchestrator. AI outputs (cyan) distinguished from rule-based heuristics. All outputs carry is_live / data_origin flags.
  </text>
</svg>
