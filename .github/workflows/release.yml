name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/metroai
    permissions:
      id-token: write  # OIDC trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$VER" ]; then
            echo "Tag $TAG does not match pyproject version $VER"
            exit 1
          fi
          echo "Tag $TAG matches pyproject version $VER"

      - name: Build sdist + wheel
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
